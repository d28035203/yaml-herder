apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: demo-api
  namespace: yaml-herder
spec:
  podSelector:
    matchLabels:
      app: demo-api
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: frontend
      ports:
        - protocol: TCP
          port: 5678
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
